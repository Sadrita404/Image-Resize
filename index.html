<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Crop Pro v2.0 - Mobile Style</title>
    <style>
        /* FEATURE: Retro Color Palette and UI Variables */
        :root {
            --retro-yellow: #f8ef02;
            --retro-green: #00ff41;
            --retro-dark-green: #003b00;
            --classic-gray: #c0c0c0;
            --border-light: #ffffff;
            --border-dark: #808080;
            --hack-red: #ec3750;
        }

        /* FEATURE: Layout Foundation */
        body { 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--retro-dark-green);
            color: #000;
        }

        .header-spacer { height: 80px; width: 100%; }

        /* FEATURE: Main Application Container */
        .app-container {
            display: flex;
            flex-direction: row;
            background-color: var(--classic-gray);
            border: 4px solid var(--border-light);
            border-right: 4px solid var(--border-dark);
            border-bottom: 4px solid var(--border-dark);
            max-width: 1200px; 
            width: 95%;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.4);
            margin-bottom: 50px;
        }

        .sidebar {
            width: 250px;
            background: #a0a0a0;
            border-right: 4px solid var(--border-dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-editor {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #222;
            position: relative;
        }

        /* FEATURE: Retro Header Style */
        h1 { 
            width: 100%;
            margin: 0 0 15px 0;
            background: var(--retro-yellow);
            padding: 10px;
            border: 3px solid #000;
            text-align: center;
            font-size: 1.2rem;
        }

        .btn-ui {
            padding: 8px;
            cursor: pointer;
            background: var(--retro-green);
            border: 3px solid var(--border-light);
            border-right: 3px solid #000;
            border-bottom: 3px solid #000;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
        }

        .btn-ui:active { transform: translate(1px, 1px); border: 3px inset #000; }

        /* FEATURE: Smartphone-Style Crop Interface */
        #editor-wrapper {
            position: relative;
            display: inline-block;
            background: #000;
            border: 2px solid #555;
            line-height: 0;
            overflow: hidden;
        }

        canvas { max-width: 100%; height: auto; display: block; }

        #crop-box {
            position: absolute;
            border: 2px solid var(--retro-yellow);
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6); /* Dimmed background */
            cursor: move;
            box-sizing: border-box;
            display: none;
        }

        /* FEATURE: Rule of Thirds Grid Lines */
        .grid-line {
            position: absolute;
            background: rgba(248, 239, 2, 0.3);
            pointer-events: none;
        }
        .v1 { left: 33.33%; top: 0; width: 1px; height: 100%; }
        .v2 { left: 66.66%; top: 0; width: 1px; height: 100%; }
        .h1 { top: 33.33%; left: 0; height: 1px; width: 100%; }
        .h2 { top: 66.66%; left: 0; height: 1px; width: 100%; }

        /* FEATURE: Modern Interaction Handles */
        .handle {
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--retro-yellow);
            border: 1px solid #000;
        }
        .tl { top: -7px; left: -7px; cursor: nw-resize; }
        .tr { top: -7px; right: -7px; cursor: ne-resize; }
        .bl { bottom: -7px; left: -7px; cursor: sw-resize; }
        .br { bottom: -7px; right: -7px; cursor: se-resize; }
        .tm { top: -7px; left: calc(50% - 7px); cursor: n-resize; }
        .bm { bottom: -7px; left: calc(50% - 7px); cursor: s-resize; }
        .lm { left: -7px; top: calc(50% - 7px); cursor: w-resize; }
        .rm { right: -7px; top: calc(50% - 7px); cursor: e-resize; }

        .preview-pane {
            margin-top: 15px;
            padding: 10px;
            background: var(--classic-gray);
            border: 3px inset #fff;
            text-align: center;
        }

        #preview-canvas { border: 2px solid #000; max-width: 200px; display: none; }

        @media (max-width: 800px) {
            .app-container { flex-direction: column; }
            .sidebar { width: auto; border-right: none; }
        }
    </style>
</head>
<body>

    <div class="header-spacer"></div>

    <div class="app-container">
        <div class="sidebar">
            <button class="btn-ui" id="btnLoad">📂 Open Image</button>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
            
            <span style="font-size: 10px; font-weight: bold;">TRANSFORM</span>
            <button class="btn-ui" id="rotateBtn">🔄 Rotate 90°</button>
            
            <span style="font-size: 10px; font-weight: bold;">ASPECT RATIO</span>
            <button class="btn-ui" onclick="setAspect(1)">1:1 Square</button>
            <button class="btn-ui" onclick="setAspect(16/9)">16:9 Wide</button>
            <button class="btn-ui" onclick="setAspect(9/16)">9:16 Story</button>
            <button class="btn-ui" onclick="setAspect(0)">Free Form</button>

            <span style="font-size: 10px; font-weight: bold;">FILTERS</span>
            <button class="btn-ui" onclick="applyFilter('grayscale(100%)')">B&W</button>
            <button class="btn-ui" onclick="applyFilter('sepia(100%)')">Sepia</button>
            <button class="btn-ui" onclick="applyFilter('none')">Reset Filter</button>

            <button class="btn-ui" id="saveBtn" style="background: #fff; margin-top: 20px;">💾 EXPORT</button>
        </div>

        <div class="main-editor">
            <h1>RETRO CROP PRO</h1>
            <div id="editor-wrapper">
                <canvas id="mainCanvas"></canvas>
                <div id="crop-box">
                    <div class="grid-line v1"></div><div class="grid-line v2"></div>
                    <div class="grid-line h1"></div><div class="grid-line h2"></div>
                    <div class="handle tl" data-handle="tl"></div>
                    <div class="handle tr" data-handle="tr"></div>
                    <div class="handle bl" data-handle="bl"></div>
                    <div class="handle br" data-handle="br"></div>
                    <div class="handle tm" data-handle="tm"></div>
                    <div class="handle bm" data-handle="bm"></div>
                    <div class="handle lm" data-handle="lm"></div>
                    <div class="handle rm" data-handle="rm"></div>
                </div>
            </div>

            <div class="preview-pane">
                <canvas id="preview-canvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        /* FEATURE: Core State Variables */
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const cropBox = document.getElementById('crop-box');
        const fileInput = document.getElementById('fileInput');
        const btnLoad = document.getElementById('btnLoad');
        const previewCanvas = document.getElementById('preview-canvas');
        const pCtx = previewCanvas.getContext('2d');

        let img = new Image();
        let rotation = 0;
        let currentFilter = 'none';
        let aspect = 0; // 0 = Free
        let isDragging = false;
        let activeHandle = null;
        let startX, startY, initialBox = {};

        /* FEATURE: Image Loading and Scaling */
        btnLoad.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    rotation = 0;
                    renderCanvas();
                    initCropBox();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function renderCanvas() {
            if (!img.src) return;
            const max = 600;
            let w = img.width, h = img.height;
            if (rotation % 180 !== 0) [w, h] = [h, w];
            
            const scale = Math.min(max/w, max/h, 1);
            canvas.width = w * scale;
            canvas.height = h * scale;

            ctx.filter = currentFilter;
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(rotation * Math.PI / 180);
            
            const drawW = (rotation % 180 === 0) ? canvas.width : canvas.height;
            const drawH = (rotation % 180 === 0) ? canvas.height : canvas.width;
            ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
            ctx.restore();
            updatePreview();
        }

        /* FEATURE: Intelligent Crop Box Placement */
        function initCropBox() {
            cropBox.style.display = 'block';
            cropBox.style.width = (canvas.width * 0.8) + 'px';
            cropBox.style.height = (canvas.height * 0.8) + 'px';
            cropBox.style.left = (canvas.width * 0.1) + 'px';
            cropBox.style.top = (canvas.height * 0.1) + 'px';
            updatePreview();
        }

        /* FEATURE: Phone-Style Drag & Resize Engine */
        cropBox.onmousedown = (e) => {
            isDragging = true;
            activeHandle = e.target.dataset.handle || 'move';
            startX = e.clientX;
            startY = e.clientY;
            initialBox = {
                l: cropBox.offsetLeft,
                t: cropBox.offsetTop,
                w: cropBox.offsetWidth,
                h: cropBox.offsetHeight
            };
            e.stopPropagation();
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            let { l, t, w, h } = initialBox;

            if (activeHandle === 'move') {
                l = Math.max(0, Math.min(l + dx, canvas.width - w));
                t = Math.max(0, Math.min(t + dy, canvas.height - h));
            } else {
                // Handle Logic for 8 Points
                if (activeHandle.includes('r')) w = Math.min(canvas.width - l, w + dx);
                if (activeHandle.includes('l')) { 
                    const newL = Math.max(0, Math.min(l + dx, l + w - 20));
                    w += (l - newL); l = newL; 
                }
                if (activeHandle.includes('b')) h = Math.min(canvas.height - t, h + dy);
                if (activeHandle.includes('t')) { 
                    const newT = Math.max(0, Math.min(t + dy, t + h - 20));
                    h += (t - newT); t = newT; 
                }

                // Aspect Ratio Enforcement
                if (aspect > 0) {
                    if (activeHandle.includes('r') || activeHandle.includes('l')) h = w / aspect;
                    else w = h * aspect;
                }
            }

            cropBox.style.left = l + 'px';
            cropBox.style.top = t + 'px';
            cropBox.style.width = Math.max(w, 20) + 'px';
            cropBox.style.height = Math.max(h, 20) + 'px';
            updatePreview();
        };

        window.onmouseup = () => isDragging = false;

        /* FEATURE: Real-time Crop Projection */
        function updatePreview() {
            const w = cropBox.offsetWidth;
            const h = cropBox.offsetHeight;
            previewCanvas.width = w;
            previewCanvas.height = h;
            previewCanvas.style.display = 'inline-block';
            pCtx.drawImage(canvas, cropBox.offsetLeft, cropBox.offsetTop, w, h, 0, 0, w, h);
        }

        /* FEATURE: UI Control Hooks */
        function setAspect(val) { aspect = val; initCropBox(); }
        function applyFilter(f) { currentFilter = f; renderCanvas(); }
        document.getElementById('rotateBtn').onclick = () => { rotation = (rotation + 90) % 360; renderCanvas(); };
        
        document.getElementById('saveBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = 'crop-export.png';
            link.href = previewCanvas.toDataURL();
            link.click();
        };
    </script>
</body>
</html>
