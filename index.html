<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Crop Pro - Hack Club Edition</title>
    <style>

        :root {
            --retro-yellow: #f8ef02;
            --retro-green: #00ff41;
            --retro-dark-green: #003b00;
            --classic-gray: #c0c0c0;
            --border-light: #ffffff;
            --border-dark: #808080;
            --hack-red: #ec3750;
        }


        body { 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--retro-dark-green);
            color: #000;
            overflow-x: hidden;
        }

        .header-spacer { height: 120px; width: 100%; }


        .app-container {
            display: flex;
            flex-direction: row;
            background-color: var(--classic-gray);
            border: 4px solid var(--border-light);
            border-right: 4px solid var(--border-dark);
            border-bottom: 4px solid var(--border-dark);
            max-width: 1200px; 
            width: 95%;
            z-index: 1;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.4);
            margin-bottom: 50px;
        }

        .sidebar {
            width: 250px;
            background: #a0a0a0;
            border-right: 4px solid var(--border-dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-editor {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #444;
        }


        h1 { 
            width: 100%;
            margin: 0;
            color: #000; 
            font-size: 1.5rem;
            text-transform: uppercase;
            background: var(--retro-yellow);
            padding: 10px;
            border-bottom: 4px solid #000;
            text-align: center;
            box-sizing: border-box;
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
        }

        
        .btn-ui {
            padding: 10px;
            cursor: pointer;
            background: var(--retro-green);
            border: 3px solid var(--border-light);
            border-right: 3px solid #000;
            border-bottom: 3px solid #000;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .btn-ui:active { 
            border: 3px solid #000;
            border-right: 3px solid var(--border-light);
            border-bottom: 3px solid var(--border-light);
            transform: translate(1px, 1px);
        }

        .btn-danger { background: var(--hack-red); color: white; }

 #editor-wrapper {
            position: relative;
            background: #111;
            border: 4px solid #000;
            user-select: none;
            overflow: hidden;
            max-width: 100%;
            max-height: 70vh;
        }

        #mainCanvas {
            display: block;
            image-rendering: pixelated;
            transition: transform 0.3s ease;
        }


        #crop-guide {
            position: absolute;
            border: 2px solid var(--retro-yellow);
            box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.7);
            cursor: move;
            display: none;
            box-sizing: border-box;
        }

        .grid-line-v, .grid-line-h {
            position: absolute;
            background: rgba(248, 239, 2, 0.4);
        }
        .grid-line-v { width: 1px; height: 100%; top: 0; }
        .grid-line-h { height: 1px; width: 100%; left: 0; }

        .handle {
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--retro-yellow);
            border: 2px solid #000;
        }
        .br { bottom: -8px; right: -8px; cursor: nwse-resize; }

        .preview-pane {
            width: 100%;
            margin-top: 20px;
            background: var(--classic-gray);
            border: 4px inset var(--border-dark);
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        #preview-canvas {
            max-width: 100%;
            border: 2px solid #000;
            display: none;
            background: #fff;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-dark);
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-weight: bold;
            color: #000;
            background: var(--retro-yellow);
            width: 100%;
            text-align: center;
            border-top: 4px solid #000;
        }
        

        @media (max-width: 800px) {
            .app-container { flex-direction: column; }
            .sidebar { width: auto; border-right: none; border-bottom: 4px solid var(--border-dark); }
        }
    </style>
</head>
<body>

    <a href="https://hackclub.com/">
        <img style="position: absolute; top: 0; left: 10px; border: 0; width: 256px; z-index: 999;" 
             src="https://assets.hackclub.com/flag-orpheus-top.svg" alt="Hack Club"/>
    </a>

    <audio id="clickSound" src="button.mp3" preload="auto"></audio>

    <div class="header-spacer"></div>

    <div class="app-container">
        <div class="sidebar">
            <div class="control-group">
                <span class="section-label">File Operations</span>
                <button class="btn-ui" id="btnLoad">📂 Open Image</button>
                <input type="file" id="fileInput" accept="image/*" style="display:none">
                <button class="btn-ui" id="saveBtn">💾 Export Crop</button>
                <button class="btn-ui btn-danger" id="resetBtn">🔄 Reset All</button>
            </div>

            <div class="control-group">
                <span class="section-label">Transform</span>
                <button class="btn-ui" id="rotateBtn">🔄 Rotate 90°</button>
                <span class="section-label">Zoom View</span>
                <input type="range" id="zoomRange" min="0.1" max="2" step="0.1" value="1">
            </div>

            <div class="control-group">
                <span class="section-label">Aspect Ratio</span>
                <button class="btn-ui" onclick="setAspect(1)">1:1 Square</button>
                <button class="btn-ui" onclick="setAspect(16/9)">16:9 Wide</button>
                <button class="btn-ui" onclick="setAspect(9/16)">9:16 Story</button>
                <button class="btn-ui" onclick="setAspect(0)">Free Form</button>
            </div>

            <div class="control-group">
                <span class="section-label">Filters</span>
                <button class="btn-ui" onclick="applyFilter('none')">Normal</button>
                <button class="btn-ui" onclick="applyFilter('grayscale(100%)')">Grayscale</button>
                <button class="btn-ui" onclick="applyFilter('sepia(100%)')">Sepia</button>
                <button class="btn-ui" onclick="applyFilter('invert(100%)')">Invert</button>
                <button class="btn-ui" onclick="applyFilter('blur(5px)')">Blur</button>
            </div>
        </div>

        <div class="main-editor">
            <h1>Retro Crop Pro v2.0</h1>
            <div id="editor-wrapper">
                <canvas id="mainCanvas"></canvas>
                <div id="crop-guide">
                    <div class="grid-line-v" style="left: 33.3%;"></div>
                    <div class="grid-line-v" style="left: 66.6%;"></div>
                    <div class="grid-line-h" style="top: 33.3%;"></div>
                    <div class="grid-line-h" style="top: 66.6%;"></div>
                    <div class="handle br"></div>
                </div>
            </div>

            <div class="preview-pane">
                <span class="section-label">Output Preview</span>
                <canvas id="preview-canvas"></canvas>
            </div>
        </div>
    </div>

    <footer>Sadrita Neogi (Hack Club) • 2024 Retro Suite</footer>

    <script>
        /* FEATURE: Canvas and UI State Initialization */
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const cropGuide = document.getElementById('crop-guide');
        const fileInput = document.getElementById('fileInput');
        const btnLoad = document.getElementById('btnLoad');
        const previewCanvas = document.getElementById('preview-canvas');
        const pCtx = previewCanvas.getContext('2d');
        const clickSound = document.getElementById('clickSound');
        const zoomRange = document.getElementById('zoomRange');

        let img = new Image();
        let isMoving = false;
        let isResizing = false;
        let startX, startY, initialW, initialH, initialL, initialT;
        let rotation = 0;
        let currentFilter = 'none';
        let aspectRatio = 0;
