<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resize - Hack Club</title>
    <style>
        :root {
            --accent-purple: #6e1fce;
            --accent-orange: #ff8c37;
            --bg-soft-yellow: #fdf5d2;
            --panel-white: #ffffff;
            --editor-blue: #00bacf;
            --text-dark: #2d2d2d;
        }

        body { 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-soft-yellow);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .header-spacer { height: 100px; width: 100%; }

        .app-container {
            display: flex;
            flex-direction: row;
            background-color: var(--panel-white);
            border: 4px solid var(--text-dark);
            max-width: 1100px; 
            width: 95%;
            box-shadow: 12px 12px 0px var(--accent-purple);
            margin-bottom: 30px;
            z-index: 5;
        }

        .sidebar {
            width: 260px;
            background: #f0f0f0;
            border-right: 4px solid var(--text-dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-editor {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--editor-blue);
            position: relative;
        }

        h1 { 
            width: 100%;
            margin: 0 0 20px 0;
            background: var(--accent-purple);
            color: white;
            padding: 12px;
            border: 3px solid var(--text-dark);
            text-align: center;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-ui {
            padding: 10px;
            cursor: pointer;
            background: var(--accent-orange);
            color: white;
            border: 3px solid var(--text-dark);
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .btn-ui:active { transform: translate(2px, 2px); box-shadow: none; }
        .btn-ui:hover { filter: brightness(1.1); }

        #editor-wrapper {
            position: relative;
            display: inline-block;
            background: #1a1a1a;
            border: 4px solid var(--text-dark);
            line-height: 0;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            /* This contains the dimming effect to the canvas only */
            overflow: hidden; 
        }

        canvas { max-width: 100%; height: auto; display: block; }

        #crop-box {
            position: absolute;
            border: 2px solid #fff;
            outline: 2px solid var(--accent-purple);
            /* Dimming effect now only covers the image area */
            box-shadow: 0 0 0 10000px rgba(0, 0, 0, 0.6);
            cursor: move;
            box-sizing: border-box;
            display: none;
        }

        .grid-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }
        .v1 { left: 33.33%; top: 0; width: 1px; height: 100%; }
        .v2 { left: 66.66%; top: 0; width: 1px; height: 100%; }
        .h1 { top: 33.33%; left: 0; height: 1px; width: 100%; }
        .h2 { top: 66.66%; left: 0; height: 1px; width: 100%; }

        .handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--accent-purple);
            border: 2px solid white;
        }
        .tl { top: -8px; left: -8px; cursor: nw-resize; }
        .tr { top: -8px; right: -8px; cursor: ne-resize; }
        .bl { bottom: -8px; left: -8px; cursor: sw-resize; }
        .br { bottom: -8px; right: -8px; cursor: se-resize; }
        .tm { top: -8px; left: calc(50% - 6px); cursor: n-resize; }
        .bm { bottom: -8px; left: calc(50% - 6px); cursor: s-resize; }
        .lm { left: -8px; top: calc(50% - 6px); cursor: w-resize; }
        .rm { right: -8px; top: calc(50% - 6px); cursor: e-resize; }

        .preview-pane {
            margin-top: 20px;
            padding: 15px;
            background: var(--panel-white);
            border: 3px solid var(--text-dark);
            text-align: center;
        }

        #preview-canvas { border: 2px solid var(--text-dark); max-width: 180px; display: none; }

        footer {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background: var(--text-dark);
            color: var(--bg-soft-yellow);
            font-weight: bold;
            letter-spacing: 1px;
            border-top: 4px solid var(--accent-orange);
            margin-top: auto;
        }

        @media (max-width: 800px) {
            .app-container { flex-direction: column; }
            .sidebar { width: auto; border-right: none; border-bottom: 4px solid var(--text-dark); }
            .header-spacer { height: 140px; }
        }
    </style>
</head>
<body>

    <a href="https://hackclub.com/">
        <img style="position: absolute; top: 0; left: 10px; border: 0; width: 256px; z-index: 999;" src="https://assets.hackclub.com/flag-orpheus-top.svg" alt="Hack Club"/>
    </a>

    <audio id="clickSfx" src="button.mp3" preload="auto"></audio>

    <div class="header-spacer"></div>

    <div class="app-container">
        <div class="sidebar">
            <button class="btn-ui" id="btnLoad">📂 Open Image</button>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
            
            <label style="font-size: 11px; font-weight: 900; color: var(--accent-purple);">EDIT TOOLS</label>
            <button class="btn-ui" id="rotateBtn">🔄 Rotate 90°</button>
            
            <label style="font-size: 11px; font-weight: 900; color: var(--accent-purple);">ASPECT RATIO</label>
            <button class="btn-ui" onclick="setAspect(1)">1:1 Square</button>
            <button class="btn-ui" onclick="setAspect(16/9)">16:9 Wide</button>
            <button class="btn-ui" onclick="setAspect(9/16)">9:16 Story</button>
            <button class="btn-ui" onclick="setAspect(0)">Free</button>

            <label style="font-size: 11px; font-weight: 900; color: var(--accent-purple);">FILTERS</label>
            <button class="btn-ui" onclick="applyFilter('grayscale(100%)')">Mono</button>
            <button class="btn-ui" onclick="applyFilter('sepia(100%)')">Vintage</button>
            <button class="btn-ui" onclick="applyFilter('none')">Reset</button>

            <button class="btn-ui" id="saveBtn" style="background: var(--text-dark); color: white; margin-top: 15px;">💾 Export</button>
        </div>

        <div class="main-editor">
            <h1>Image Resize</h1>
            <div id="editor-wrapper">
                <canvas id="mainCanvas"></canvas>
                <div id="crop-box">
                    <div class="grid-line v1"></div><div class="grid-line v2"></div>
                    <div class="grid-line h1"></div><div class="grid-line h2"></div>
                    <div class="handle tl" data-handle="tl"></div>
                    <div class="handle tr" data-handle="tr"></div>
                    <div class="handle bl" data-handle="bl"></div>
                    <div class="handle br" data-handle="br"></div>
                    <div class="handle tm" data-handle="tm"></div>
                    <div class="handle bm" data-handle="bm"></div>
                    <div class="handle lm" data-handle="lm"></div>
                    <div class="handle rm" data-handle="rm"></div>
                </div>
            </div>

            <div class="preview-pane">
                <canvas id="preview-canvas"></canvas>
            </div>
        </div>
    </div>

    <footer>
        Sadrita Neogi (Hack Club)
    </footer>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const cropBox = document.getElementById('crop-box');
        const fileInput = document.getElementById('fileInput');
        const btnLoad = document.getElementById('btnLoad');
        const previewCanvas = document.getElementById('preview-canvas');
        const pCtx = previewCanvas.getContext('2d');
        const sfx = document.getElementById('clickSfx');

        let img = new Image();
        let rotation = 0;
        let currentFilter = 'none';
        let aspect = 0; 
        let isDragging = false;
        let activeHandle = null;
        let startX, startY, initialBox = {};

        function playSound() {
            sfx.currentTime = 0;
            sfx.play().catch(() => {});
        }

        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', playSound);
        });

        btnLoad.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                img.onload = () => {
                    rotation = 0;
                    renderCanvas();
                    initCropBox();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function renderCanvas() {
            if (!img.src) return;
            const max = 550;
            let w = img.width, h = img.height;
            if (rotation % 180 !== 0) [w, h] = [h, w];
            
            const scale = Math.min(max/w, max/h, 1);
            canvas.width = w * scale;
            canvas.height = h * scale;

            ctx.filter = currentFilter;
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(rotation * Math.PI / 180);
            
            const drawW = (rotation % 180 === 0) ? canvas.width : canvas.height;
            const drawH = (rotation % 180 === 0) ? canvas.height : canvas.width;
            ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
            ctx.restore();
            updatePreview();
        }

        function initCropBox() {
            cropBox.style.display = 'block';
            cropBox.style.width = (canvas.width * 0.7) + 'px';
            cropBox.style.height = (canvas.height * 0.7) + 'px';
            cropBox.style.left = (canvas.width * 0.15) + 'px';
            cropBox.style.top = (canvas.height * 0.15) + 'px';
            updatePreview();
        }

        cropBox.onmousedown = (e) => {
            playSound();
            isDragging = true;
            activeHandle = e.target.dataset.handle || 'move';
            startX = e.clientX;
            startY = e.clientY;
            initialBox = {
                l: cropBox.offsetLeft,
                t: cropBox.offsetTop,
                w: cropBox.offsetWidth,
                h: cropBox.offsetHeight
            };
            e.stopPropagation();
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            let { l, t, w, h } = initialBox;

            if (activeHandle === 'move') {
                l = Math.max(0, Math.min(l + dx, canvas.width - w));
                t = Math.max(0, Math.min(t + dy, canvas.height - h));
            } else {
                if (activeHandle.includes('r')) w = Math.min(canvas.width - l, w + dx);
                if (activeHandle.includes('l')) { 
                    const newL = Math.max(0, Math.min(l + dx, l + w - 30));
                    w += (l - newL); l = newL; 
                }
                if (activeHandle.includes('b')) h = Math.min(canvas.height - t, h + dy);
                if (activeHandle.includes('t')) { 
                    const newT = Math.max(0, Math.min(t + dy, t + h - 30));
                    h += (t - newT); t = newT; 
                }

                if (aspect > 0) {
                    if (activeHandle.includes('r') || activeHandle.includes('l')) h = w / aspect;
                    else w = h * aspect;
                }
            }

            cropBox.style.left = l + 'px';
            cropBox.style.top = t + 'px';
            cropBox.style.width = Math.max(w, 30) + 'px';
            cropBox.style.height = Math.max(h, 30) + 'px';
            updatePreview();
        };

        window.onmouseup = () => isDragging = false;

        function updatePreview() {
            if (!img.src) return;
            const w = cropBox.offsetWidth;
            const h = cropBox.offsetHeight;
            previewCanvas.width = w;
            previewCanvas.height = h;
            previewCanvas.style.display = 'inline-block';
            pCtx.drawImage(canvas, cropBox.offsetLeft, cropBox.offsetTop, w, h, 0, 0, w, h);
        }

        function setAspect(val) { aspect = val; initCropBox(); }
        function applyFilter(f) { currentFilter = f; renderCanvas(); }
        document.getElementById('rotateBtn').onclick = () => { rotation = (rotation + 90) % 360; renderCanvas(); };
        
        document.getElementById('saveBtn').onclick = () => {
            if (!img.src) return;
            const link = document.createElement('a');
            link.download = 'hackclub-crop.png';
            link.href = previewCanvas.toDataURL();
            link.click();
        };
    </script>
</body>
</html>
